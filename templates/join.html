<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mafia - Join Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            margin: 0;
            background: #680202;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #bady-div {
            max-width: 400px;
            margin: 60px auto 20px;
            padding: 20px;
            background: #575656;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        img.post-media { display: block; margin: 0 auto 20px; width: 100px; }
        fieldset { border: none; }
        h3 {
            text-align: center;
            color: #ff3b3b;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff3b3b;
            padding-bottom: 5px;
        }
        label { display: block; margin-bottom: 4px; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        input.code { text-transform: uppercase; letter-spacing: 3px; font-size: 18px; font-weight: bold; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff3b3b;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #e22b2b; }
        .back { display: block; text-align: center; margin-top: 12px; color: #ccc; font-size: 13px; text-decoration: none; }
        .back:hover { color: white; }
        .error { background: #8b0000; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .footer { text-align: center; margin-top: auto; font-size: 12px; opacity: 0.6; padding: 10px 0; }
    </style>
</head>
<body>
    <div id="bady-div">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="post-media">
        <fieldset>
            <h3>Join a Room</h3>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <label>Your name</label>
                <input name="name" required autocomplete="off">
                <label>Room code</label>
                <input name="room_code" class="code" required autocomplete="off" maxlength="6">
                <label>Password</label>
                <input name="password" type="password" required autocomplete="off">
                <button>Join</button>
            </form>
        </fieldset>
        <a href="/" class="back">← Back</a>
    </div>
    <div class="footer">
        <hr>
        <h5>by: rabii © 2025-2026</h5>
    </div>
</body>
</html>
