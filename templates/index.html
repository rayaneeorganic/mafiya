<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mafia - Prepa Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; background: #680202; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        #bady-div { max-width: 400px; margin: 60px auto 20px; padding: 20px; background: #575656; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.5); text-align: center; }
        img.post-media { display: block; margin: 0 auto 20px; width: 100px; }
        h3 { text-align: center; color: #ff3b3b; margin-bottom: 20px; border-bottom: 2px solid #ff3b3b; padding-bottom: 5px; }
        .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        .btn-primary { background: #ff3b3b; color: white; }
        .btn-primary:hover { background: #e22b2b; }
        .footer { text-align: center; margin-top: auto; font-size: 12px; opacity: 0.6; padding: 10px 0; }
    </style>
</head>
<body>
    <div id="bady-div">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="post-media">
        <h3>mafia - prepa edition</h3>
        <a href="/join" class="btn btn-primary">Join a Room</a>
    </div>
    <div class="footer"><hr><h5>by: rabii © 2025-2026</h5></div>
</body>
</html>
