<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        #bady-div { max-width: 360px; margin: 80px auto 20px; padding: 30px 24px; background: #2a2a2a; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        h3 { text-align: center; color: #ff3b3b; margin-bottom: 24px; font-size: 20px; letter-spacing: 1px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
        input { width: 100%; padding: 11px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; font-size: 15px; }
        input:focus { border-color: #ff3b3b; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #ff3b3b; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e22b2b; }
        .error { background: #5a0000; padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; text-align: center; }
        .footer { text-align: center; margin-top: auto; font-size: 12px; opacity: 0.4; padding: 10px 0; }
    </style>
</head>
<body>
    <div id="bady-div">
        <h3>Admin Access</h3>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label>Password</label>
            <input type="password" name="password" autofocus required>
            <button>Enter</button>
        </form>
    </div>
    <div class="footer"><hr><h5>by: rabii © 2025-2026</h5></div>
</body>
</html>
