<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mafia - Prepa Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #680202;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #bady-div {
            max-width: 400px;
            margin: 60px auto 20px;
            padding: 20px;
            background: #575656;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        img.post-media {
            display: block;
            margin: 0 auto 20px;
            width: 100px;
        }

        fieldset {
            border: none;
        }

        h3 {
            text-align: center;
            color: #ff3b3b;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff3b3b;
            padding-bottom: 5px;
        }

        h4 {
            margin: 10px 0 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff3b3b;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e22b2b;
        }

        .footer {
            text-align: center;
            margin-top: auto;
            font-size: 12px;
            opacity: 0.6;
            padding: 10px 0;
        }
    </style>
</head>

<body>

    <div id="bady-div">
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="post-media">
        <fieldset>
            <h2>Choose your name</h2>

            {% for i in range(players|length) %}
            <a href="/role/{{ i }}">
                <button>{{ players[i].name }}</button>
            </a>
            {% endfor %}
        </fieldset>
    </div>

    <div class="footer">
        <hr>
        <h5>by: rabii © 2025-2026</h5>
    </div>

</body>

</html>
